name: Run Tests
on:
  pull_request:
  push:
    branches:
      - main

jobs:
  tests:
    name: Run Tests
    runs-on: ubuntu-latest
    services:
      postgres:
        image: pgvector/pgvector:pg17
        env:
          POSTGRES_USER: thinclaw
          POSTGRES_PASSWORD: thinclaw
          POSTGRES_DB: thinclaw_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U thinclaw"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_BACKEND: postgres
      DATABASE_URL: postgres://thinclaw:thinclaw@localhost:5432/thinclaw_test
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Enable pgvector extension
        run: PGPASSWORD=thinclaw psql -h localhost -U thinclaw -d thinclaw_test -c "CREATE EXTENSION IF NOT EXISTS vector;"
      - name: Install system dependencies
        run: sudo apt-get update && sudo apt-get install -y libasound2-dev
      - name: Run Tests
        run: cargo test --all-features -- --nocapture
      - name: Run Telegram Channel Tests
        run: cargo test --manifest-path channels-src/telegram/Cargo.toml -- --nocapture

# SPDX-License-Identifier: MIT or Apache-2.0
#
# CI that:
#
# * checks for a Git Tag that looks like a release
# * builds artifacts with dist (archives, installers, hashes)
# * uploads those artifacts to temporary workflow zip
# * on success, uploads the artifacts to a GitHub Release
#
# Note that the GitHub Release will be created with a generated
# title/body based on your changelogs.

name: Release
permissions:
  "contents": "write"
  "packages": "write"

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

# This task will run whenever you push a git tag that looks like a version
# like "1.0.0", "v0.1.0-prerelease.1", "my-app/0.1.0", "releases/v1.0.0", etc.
# Various formats will be parsed into a VERSION and an optional PACKAGE_NAME, where
# PACKAGE_NAME must be the name of a Cargo package in your workspace, and VERSION
# must be a Cargo-style SemVer Version (must have at least major.minor.patch).
#
# If PACKAGE_NAME is specified, then the announcement will be for that
# package (erroring out if it doesn't have the given version or isn't dist-able).
#
# If PACKAGE_NAME isn't specified, then the announcement will be for all
# (dist-able) packages in the workspace with that version (this mode is
# intended for workspaces with only one dist-able package, or with all dist-able
# packages versioned/released in lockstep).
#
# If you push multiple tags at once, separate instances of this workflow will
# spin up, creating an independent announcement for each one. However, GitHub
# will hard limit this to 3 tags per commit, as it will assume more tags is a
# mistake.
#
# If there's a prerelease-style suffix to the version, then the release(s)
# will be marked as a prerelease.
on:
  push:
    tags:
      - '**[0-9]+.[0-9]+.[0-9]+*'

jobs:
  # Run 'dist plan' (or host) to determine what tasks we need to do
  plan:
    runs-on: "ubuntu-22.04"
    outputs:
      val: ${{ steps.plan.outputs.manifest }}
      tag: ${{ !github.event.pull_request && github.ref_name || '' }}
      tag-flag: ${{ !github.event.pull_request && format('--tag={0}', github.ref_name) || '' }}
      publishing: ${{ !github.event.pull_request }}
    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false
          submodules: recursive
      - name: Install dist
        # we specify bash to get pipefail; it guards against the `curl` command
        # failing. otherwise `sh` won't catch that `curl` returned non-0
        shell: bash
        run: "curl --proto '=https' --tlsv1.2 -LsSf https://github.com/axodotdev/cargo-dist/releases/download/v0.31.0/cargo-dist-installer.sh | sh"
      - name: Cache dist
        uses: actions/upload-artifact@v4
        with:
          name: cargo-dist-cache
          path: ~/.cargo/bin/dist
      # sure would be cool if github gave us proper conditionals...
      # so here's a doubly-nested ternary-via-truthiness to try to provide the best possible
      # functionality based on whether this is a pull_request, and whether it's from a fork.
      # (PRs run on the *source* but secrets are usually on the *target* -- that's *good*
      # but also really annoying to build CI around when it needs secrets to work right.)
      - id: plan
        run: |
          dist ${{ (!github.event.pull_request && format('host --steps=create --tag={0}', github.ref_name)) || 'plan' }} --output-format=json > plan-dist-manifest.json
          echo "dist ran successfully"
          cat plan-dist-manifest.json
          echo "manifest=$(jq -c "." plan-dist-manifest.json)" >> "$GITHUB_OUTPUT"
      - name: "Upload dist-manifest.json"
        uses: actions/upload-artifact@v4
        with:
          name: artifacts-plan-dist-manifest
          path: plan-dist-manifest.json

  windows-runtime-smoke:
    needs:
      - plan
    if: ${{ needs.plan.outputs.publishing == 'true' }}
    runs-on: windows-2022
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false
          submodules: recursive
      - name: Install Rust
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: 1.92.0
      - uses: swatinem/rust-cache@v2
        with:
          key: windows-release-smoke
      - name: Host runtime smoke
        run: cargo test --features full --bin thinclaw --test host_runtime_smoke run_no_onboard_binds_gateway_port_zero -- --nocapture

  # Build and packages all the platform-specific things
  build-local-artifacts:
    name: build-local-artifacts (${{ join(matrix.targets, ', ') }})
    # Wait for WASM extensions so we can patch manifests with SHA256 checksums
    # before build.rs bakes them into the embedded catalog.
    needs:
      - plan
      - build-wasm-extensions
    if: ${{ fromJson(needs.plan.outputs.val).ci.github.artifacts_matrix.include != null && (needs.plan.outputs.publishing == 'true' || fromJson(needs.plan.outputs.val).ci.github.pr_run_mode == 'upload') && (needs.build-wasm-extensions.result == 'skipped' || needs.build-wasm-extensions.result == 'success') }}
    strategy:
      fail-fast: false
      # Target platforms/runners are computed by dist in create-release.
      # Each member of the matrix has the following arguments:
      #
      # - runner: the github runner
      # - dist-args: cli flags to pass to dist
      # - install-dist: expression to run to install dist on the runner
      #
      # Typically there will be:
      # - 1 "global" task that builds universal installers
      # - N "local" tasks that build each platform's binaries and platform-specific installers
      matrix: ${{ fromJson(needs.plan.outputs.val).ci.github.artifacts_matrix }}
    runs-on: ${{ matrix.runner }}
    container: ${{ matrix.container && matrix.container.image || null }}
    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      BUILD_MANIFEST_NAME: target/distrib/${{ join(matrix.targets, '-') }}-dist-manifest.json
    steps:
      - name: enable windows longpaths
        run: |
          git config --global core.longpaths true
      - uses: actions/checkout@v6
        with:
          persist-credentials: false
          submodules: recursive
      - name: Install Rust non-interactively if not already installed
        if: ${{ matrix.container }}
        run: |
          if ! command -v cargo > /dev/null 2>&1; then
            curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y
            echo "$HOME/.cargo/bin" >> $GITHUB_PATH
          fi
      - uses: swatinem/rust-cache@v2
        with:
          key: ${{ join(matrix.targets, '-') }}
          cache-provider: ${{ matrix.cache_provider }}
      - name: Install dist
        run: ${{ matrix.install_dist.run }}
      # Get the dist-manifest
      - name: Fetch local artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: artifacts-*
          path: target/distrib/
          merge-multiple: true
      - name: Patch manifests with WASM artifact URLs and checksums
        if: ${{ needs.plan.outputs.publishing == 'true' }}
        shell: bash
        env:
          RELEASE_TAG: ${{ needs.plan.outputs.tag }}
        run: |
          CHECKSUMS="target/distrib/checksums.txt"
          if [ ! -f "$CHECKSUMS" ]; then
            echo "No checksums.txt found, skipping manifest patching"
            exit 0
          fi

          # Derive repo owner/name from GITHUB_REPOSITORY (e.g. "RNT56/ThinClaw")
          REPO="${GITHUB_REPOSITORY}"

          while IFS= read -r line; do
            sha256=$(echo "$line" | awk '{print $1}')
            filename=$(echo "$line" | awk '{print $2}')
            name=$(echo "$filename" | sed 's/-wasm32-wasip2\.tar\.gz$//')
            download_url="https://github.com/${REPO}/releases/download/${RELEASE_TAG}/${filename}"

            # Search all manifests by their internal .name field, not filename
            for manifest in registry/tools/*.json registry/channels/*.json; do
              [ -f "$manifest" ] || continue
              manifest_name=$(jq -r '.name' "$manifest")
              if [ "$manifest_name" = "$name" ]; then
                jq --arg url "$download_url" --arg sha "$sha256" \
                  '.artifacts["wasm32-wasip2"].url = $url | .artifacts["wasm32-wasip2"].sha256 = $sha' \
                  "$manifest" > "${manifest}.tmp" && mv "${manifest}.tmp" "$manifest"
                echo "Patched $manifest (name=$manifest_name): url=$download_url sha256=$sha256"
              fi
            done
          done < "$CHECKSUMS"
      - name: Install dependencies
        run: |
          ${{ matrix.packages_install }}
      - name: Build artifacts
        run: |
          # Actually do builds and make zips and whatnot
          dist build ${{ needs.plan.outputs.tag-flag }} --print=linkage --output-format=json ${{ matrix.dist_args }} > dist-manifest.json
          echo "dist ran successfully"
      - id: cargo-dist
        name: Post-build
        # We force bash here just because github makes it really hard to get values up
        # to "real" actions without writing to env-vars, and writing to env-vars has
        # inconsistent syntax between shell and powershell.
        shell: bash
        run: |
          # Parse out what we just built and upload it to scratch storage
          echo "paths<<EOF" >> "$GITHUB_OUTPUT"
          dist print-upload-files-from-manifest --manifest dist-manifest.json >> "$GITHUB_OUTPUT"
          echo "EOF" >> "$GITHUB_OUTPUT"

          cp dist-manifest.json "$BUILD_MANIFEST_NAME"
      - name: "Upload artifacts"
        uses: actions/upload-artifact@v4
        with:
          name: artifacts-build-local-${{ join(matrix.targets, '_') }}
          path: |
            ${{ steps.cargo-dist.outputs.paths }}
            ${{ env.BUILD_MANIFEST_NAME }}

  # Build and package all the platform-agnostic(ish) things
  build-global-artifacts:
    needs:
      - plan
      - build-local-artifacts
    runs-on: "ubuntu-22.04"
    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      BUILD_MANIFEST_NAME: target/distrib/global-dist-manifest.json
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false
          submodules: recursive
      - name: Install cached dist
        uses: actions/download-artifact@v4
        with:
          name: cargo-dist-cache
          path: ~/.cargo/bin/
      - run: chmod +x ~/.cargo/bin/dist
      # Get all the local artifacts for the global tasks to use (for e.g. checksums)
      - name: Fetch local artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: artifacts-*
          path: target/distrib/
          merge-multiple: true
      - id: cargo-dist
        shell: bash
        run: |
          dist build ${{ needs.plan.outputs.tag-flag }} --output-format=json "--artifacts=global" > dist-manifest.json
          echo "dist ran successfully"

          # Parse out what we just built and upload it to scratch storage
          echo "paths<<EOF" >> "$GITHUB_OUTPUT"
          jq --raw-output ".upload_files[]" dist-manifest.json >> "$GITHUB_OUTPUT"
          echo "EOF" >> "$GITHUB_OUTPUT"

          cp dist-manifest.json "$BUILD_MANIFEST_NAME"
      - name: "Upload artifacts"
        uses: actions/upload-artifact@v4
        with:
          name: artifacts-build-global
          path: |
            ${{ steps.cargo-dist.outputs.paths }}
            ${{ env.BUILD_MANIFEST_NAME }}
  # Build WASM extension bundles (tar.gz with .wasm + .capabilities.json)
  build-wasm-extensions:
    needs:
      - plan
    if: ${{ needs.plan.outputs.publishing == 'true' }}
    runs-on: "ubuntu-22.04"
    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false
          submodules: recursive
      - name: Install Rust toolchain + wasm target
        run: |
          rustup target add wasm32-wasip2
          cargo install cargo-component --locked
      - uses: swatinem/rust-cache@v2
        with:
          key: wasm-extensions
      - name: Build and package WASM extensions
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p target/wasm-bundles
          : > target/wasm-bundles/checksums.txt
          manifest_count=0
          bundle_count=0

          # Process each manifest in registry/tools/ and registry/channels/
          for manifest in registry/tools/*.json registry/channels/*.json; do
            [ -f "$manifest" ] || continue
            manifest_count=$((manifest_count + 1))

            name=$(jq -r '.name' "$manifest")
            source_dir=$(jq -r '.source.dir' "$manifest")
            caps_file=$(jq -r '.source.capabilities' "$manifest")
            crate_name=$(jq -r '.source.crate_name' "$manifest")

            if [ ! -d "$source_dir" ]; then
              echo "::error::Source dir '$source_dir' not found for '$name'"
              exit 1
            fi
            if [ ! -f "$source_dir/Cargo.toml" ]; then
              echo "::error::Cargo manifest missing at '$source_dir/Cargo.toml' for '$name'"
              exit 1
            fi
            if [ ! -f "$source_dir/$caps_file" ]; then
              echo "::error::Capabilities file missing at '$source_dir/$caps_file' for '$name'"
              exit 1
            fi

            echo "=== Building $name from $source_dir ==="

            # Build WASM component
            cargo component build --release --manifest-path "$source_dir/Cargo.toml"

            # Find the built WASM file (Cargo uses underscores in artifact names)
            wasm_artifact="${crate_name//-/_}"
            wasm_path=""
            for target_dir in wasm32-wasip2 wasm32-wasip1 wasm32-wasi; do
              candidate="$source_dir/target/$target_dir/release/${wasm_artifact}.wasm"
              if [ -f "$candidate" ]; then
                wasm_path="$candidate"
                break
              fi
            done

            if [ -z "$wasm_path" ]; then
              echo "::error::No WASM output found for '$name'"
              exit 1
            fi

            # Copy files with standardized names for the archive
            cp "$wasm_path" "target/wasm-bundles/${name}.wasm"
            cp "$source_dir/$caps_file" "target/wasm-bundles/${name}.capabilities.json"

            # Create tar.gz bundle
            bundle="target/wasm-bundles/${name}-wasm32-wasip2.tar.gz"
            (cd target/wasm-bundles && tar czf "${name}-wasm32-wasip2.tar.gz" "${name}.wasm" "${name}.capabilities.json")

            # Compute SHA256
            sha256=$(sha256sum "$bundle" | cut -d' ' -f1)
            echo "$sha256  ${name}-wasm32-wasip2.tar.gz" >> target/wasm-bundles/checksums.txt
            bundle_count=$((bundle_count + 1))

            # Clean up intermediate files
            rm -f "target/wasm-bundles/${name}.wasm" "target/wasm-bundles/${name}.capabilities.json"

            echo "  -> $bundle ($sha256)"
          done

          if [ "$manifest_count" -eq 0 ]; then
            echo "::error::No WASM extension manifests found"
            exit 1
          fi
          if [ "$bundle_count" -ne "$manifest_count" ]; then
            echo "::error::Built $bundle_count WASM bundles for $manifest_count manifests"
            exit 1
          fi

          echo "=== WASM bundles built ==="
          ls -la target/wasm-bundles/
      - name: "Upload WASM bundles"
        uses: actions/upload-artifact@v4
        with:
          name: artifacts-wasm-extensions
          path: |
            target/wasm-bundles/*.tar.gz
            target/wasm-bundles/checksums.txt
          if-no-files-found: error

  # ── Container image pipeline ───────────────────────────────────────────
  # Instead of compiling Rust inside Docker (which hangs under QEMU for
  # ARM64), we download the pre-built binaries from cargo-dist artifacts
  # and package them into lightweight Debian images.
  #
  # Architecture:
  #   build-container-amd64  →  ghcr.io/…:v0.x.y-amd64
  #   build-container-arm64  →  ghcr.io/…:v0.x.y-arm64
  #   publish-container-manifest  →  ghcr.io/…:v0.x.y  (multi-arch)
  #                               →  ghcr.io/…:latest  (multi-arch)

  build-container-amd64:
    needs:
      - plan
      - build-local-artifacts
    if: ${{ needs.plan.outputs.publishing == 'true' }}
    runs-on: ubuntu-22.04
    timeout-minutes: 30
    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      DOCKER_BUILD_SUMMARY: "true"
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false
          submodules: recursive
      - name: Set lowercase image ref
        id: image
        shell: bash
        run: echo "ref=ghcr.io/${GITHUB_REPOSITORY,,}" >> "$GITHUB_OUTPUT"
      - name: Download pre-built amd64 binary
        uses: actions/download-artifact@v4
        with:
          pattern: artifacts-build-local-x86_64-unknown-linux-gnu*
          path: target/distrib/
          merge-multiple: true
      - name: Extract binary from dist archive
        shell: bash
        run: |
          set -euo pipefail
          archive=$(find target/distrib/ -name '*x86_64-unknown-linux-gnu*.tar.gz' -not -name '*dist-manifest*' | head -1)
          if [ -z "$archive" ]; then
            echo "::error::No x86_64 linux archive found in artifacts"
            ls -laR target/distrib/
            exit 1
          fi
          echo "Extracting binary from: $archive"
          tar xzf "$archive" --wildcards '*/thinclaw' --strip-components=1
          chmod +x thinclaw
          file thinclaw
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build and push amd64 image
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64
          push: true
          provenance: false
          build-args: |
            THINCLAW_BINARY=thinclaw
          tags: |
            ${{ steps.image.outputs.ref }}:${{ needs.plan.outputs.tag }}-amd64
          outputs: type=registry
          cache-from: type=gha,scope=container-amd64
          cache-to: type=gha,mode=max,scope=container-amd64

  build-container-arm64:
    needs:
      - plan
      - build-local-artifacts
    if: ${{ needs.plan.outputs.publishing == 'true' }}
    runs-on: ubuntu-24.04-arm
    timeout-minutes: 30
    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      DOCKER_BUILD_SUMMARY: "true"
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false
          submodules: recursive
      - name: Set lowercase image ref
        id: image
        shell: bash
        run: echo "ref=ghcr.io/${GITHUB_REPOSITORY,,}" >> "$GITHUB_OUTPUT"
      - name: Download pre-built arm64 binary
        uses: actions/download-artifact@v4
        with:
          pattern: artifacts-build-local-aarch64-unknown-linux-gnu*
          path: target/distrib/
          merge-multiple: true
      - name: Extract binary from dist archive
        shell: bash
        run: |
          set -euo pipefail
          archive=$(find target/distrib/ -name '*aarch64-unknown-linux-gnu*.tar.gz' -not -name '*dist-manifest*' | head -1)
          if [ -z "$archive" ]; then
            echo "::error::No aarch64 linux archive found in artifacts"
            ls -laR target/distrib/
            exit 1
          fi
          echo "Extracting binary from: $archive"
          tar xzf "$archive" --wildcards '*/thinclaw' --strip-components=1
          chmod +x thinclaw
          file thinclaw
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build and push arm64 image
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/arm64
          push: true
          provenance: false
          build-args: |
            THINCLAW_BINARY=thinclaw
          tags: |
            ${{ steps.image.outputs.ref }}:${{ needs.plan.outputs.tag }}-arm64
          outputs: type=registry
          cache-from: type=gha,scope=container-arm64
          cache-to: type=gha,mode=max,scope=container-arm64

  publish-container-manifest:
    needs:
      - plan
      - build-container-amd64
      - build-container-arm64
    if: ${{ needs.plan.outputs.publishing == 'true' }}
    runs-on: ubuntu-22.04
    timeout-minutes: 10
    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - name: Set lowercase image ref
        id: image
        shell: bash
        run: echo "ref=ghcr.io/${GITHUB_REPOSITORY,,}" >> "$GITHUB_OUTPUT"
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Create and push multi-arch manifest
        shell: bash
        env:
          IMAGE_REF: ${{ steps.image.outputs.ref }}
          TAG: ${{ needs.plan.outputs.tag }}
        run: |
          set -euo pipefail

          # Create versioned multi-arch manifest
          docker manifest create "${IMAGE_REF}:${TAG}" \
            "${IMAGE_REF}:${TAG}-amd64" \
            "${IMAGE_REF}:${TAG}-arm64"
          docker manifest annotate "${IMAGE_REF}:${TAG}" \
            "${IMAGE_REF}:${TAG}-amd64" --os linux --arch amd64
          docker manifest annotate "${IMAGE_REF}:${TAG}" \
            "${IMAGE_REF}:${TAG}-arm64" --os linux --arch arm64
          docker manifest push "${IMAGE_REF}:${TAG}"

          # Create/update :latest multi-arch manifest
          docker manifest create "${IMAGE_REF}:latest" \
            "${IMAGE_REF}:${TAG}-amd64" \
            "${IMAGE_REF}:${TAG}-arm64"
          docker manifest annotate "${IMAGE_REF}:latest" \
            "${IMAGE_REF}:${TAG}-amd64" --os linux --arch amd64
          docker manifest annotate "${IMAGE_REF}:latest" \
            "${IMAGE_REF}:${TAG}-arm64" --os linux --arch arm64
          docker manifest push "${IMAGE_REF}:latest"

          echo "✅ Published multi-arch manifest:"
          echo "   ${IMAGE_REF}:${TAG}"
          echo "   ${IMAGE_REF}:latest"

  # Determines if we should publish/announce
  host:
    needs:
      - plan
      - windows-runtime-smoke
      - build-local-artifacts
      - build-global-artifacts
      - build-wasm-extensions
      - publish-container-manifest
    # Only run if we're "publishing", and only if plan, local, global, and wasm didn't fail (skipped is fine)
    if: ${{ always() && needs.plan.result == 'success' && needs.plan.outputs.publishing == 'true' && needs.windows-runtime-smoke.result == 'success' && (needs.build-global-artifacts.result == 'skipped' || needs.build-global-artifacts.result == 'success') && (needs.build-local-artifacts.result == 'skipped' || needs.build-local-artifacts.result == 'success') && (needs.build-wasm-extensions.result == 'skipped' || needs.build-wasm-extensions.result == 'success') && needs.publish-container-manifest.result == 'success' }}
    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    runs-on: "ubuntu-22.04"
    outputs:
      val: ${{ steps.host.outputs.manifest }}
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false
          submodules: recursive
      - name: Install cached dist
        uses: actions/download-artifact@v4
        with:
          name: cargo-dist-cache
          path: ~/.cargo/bin/
      - run: chmod +x ~/.cargo/bin/dist
      # Fetch artifacts from scratch-storage
      - name: Fetch artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: artifacts-*
          path: target/distrib/
          merge-multiple: true
      - id: host
        shell: bash
        run: |
          dist host ${{ needs.plan.outputs.tag-flag }} --steps=upload --steps=release --output-format=json > dist-manifest.json
          echo "artifacts uploaded and released successfully"
          cat dist-manifest.json
          echo "manifest=$(jq -c "." dist-manifest.json)" >> "$GITHUB_OUTPUT"
      - name: "Upload dist-manifest.json"
        uses: actions/upload-artifact@v4
        with:
          # Overwrite the previous copy
          name: artifacts-dist-manifest
          path: dist-manifest.json
      # Create a GitHub Release while uploading all files to it
      - name: "Download GitHub Artifacts"
        uses: actions/download-artifact@v4
        with:
          pattern: artifacts-*
          path: artifacts
          merge-multiple: true
      - name: Cleanup
        run: |
          # Remove the granular manifests
          rm -f artifacts/*-dist-manifest.json
          # Publish stable archive aliases used by scripts/thinclaw-installer.sh.
          # cargo-dist archive names can include version/app metadata; the alias
          # keeps the user-facing installer URL predictable.
          for target in \
            aarch64-apple-darwin \
            x86_64-apple-darwin \
            aarch64-unknown-linux-gnu \
            x86_64-unknown-linux-gnu \
            aarch64-unknown-linux-musl \
            x86_64-unknown-linux-musl
          do
            src="$(find artifacts -maxdepth 1 -type f -name "*${target}*.tar.gz" ! -name "thinclaw-${target}.tar.gz" | head -1)"
            if [ -n "$src" ]; then
              cp "$src" "artifacts/thinclaw-${target}.tar.gz"
            fi
          done
          if command -v sha256sum >/dev/null 2>&1; then
            sha256sum artifacts/thinclaw-*.tar.gz | awk '{ n=$2; sub(/^artifacts\//, "", n); print $1 "  " n }' > artifacts/checksums.txt
          else
            shasum -a 256 artifacts/thinclaw-*.tar.gz | awk '{ n=$2; sub(/^artifacts\//, "", n); print $1 "  " n }' > artifacts/checksums.txt
          fi
          cp scripts/thinclaw-installer.sh artifacts/thinclaw-installer.sh
          chmod +x artifacts/thinclaw-installer.sh
      - name: Create GitHub Release
        env:
          PRERELEASE_FLAG: "${{ fromJson(steps.host.outputs.manifest).announcement_is_prerelease && '--prerelease' || '' }}"
          ANNOUNCEMENT_TITLE: "${{ fromJson(steps.host.outputs.manifest).announcement_title }}"
          ANNOUNCEMENT_BODY: "${{ fromJson(steps.host.outputs.manifest).announcement_github_body }}"
          RELEASE_COMMIT: "${{ github.sha }}"
        run: |
          set -euo pipefail
          TAG="${{ needs.plan.outputs.tag }}"

          # Write and read notes from a file to avoid quoting breaking things
          echo "$ANNOUNCEMENT_BODY" > $RUNNER_TEMP/notes.txt

          shopt -s nullglob
          artifacts=(artifacts/*)
          if [ ${#artifacts[@]} -eq 0 ]; then
            echo "::error::No release artifacts were found in ./artifacts"
            exit 1
          fi

          # Make release publication idempotent so reruns don't fail when the tag already exists.
          if gh release view "$TAG" >/dev/null 2>&1; then
            echo "Release $TAG already exists; updating metadata and replacing artifacts."
            gh release upload "$TAG" "${artifacts[@]}" --clobber
            gh release edit "$TAG" --target "$RELEASE_COMMIT" $PRERELEASE_FLAG --title "$ANNOUNCEMENT_TITLE" --notes-file "$RUNNER_TEMP/notes.txt"
          else
            gh release create "$TAG" --target "$RELEASE_COMMIT" $PRERELEASE_FLAG --title "$ANNOUNCEMENT_TITLE" --notes-file "$RUNNER_TEMP/notes.txt" "${artifacts[@]}"
          fi

  build-edge-artifacts:
    needs:
      - plan
      - host
    if: ${{ always() && needs.host.result == 'success' }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            runner: ubuntu-22.04
          - target: x86_64-unknown-linux-musl
            runner: ubuntu-22.04
          - target: aarch64-unknown-linux-gnu
            runner: ubuntu-24.04-arm
          - target: aarch64-unknown-linux-musl
            runner: ubuntu-24.04-arm
    runs-on: ${{ matrix.runner }}
    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false
          submodules: recursive
      - name: Install Rust
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: 1.92.0
          targets: ${{ matrix.target }}
      - uses: swatinem/rust-cache@v2
        with:
          key: edge-${{ matrix.target }}
      - name: Install musl toolchain
        shell: bash
        run: |
          set -euo pipefail
          if [[ "${{ matrix.target }}" != *-musl ]]; then
            exit 0
          fi

          sudo apt-get update
          sudo apt-get install -y musl-tools

          musl_gcc="$(command -v musl-gcc)"
          case "${{ matrix.target }}" in
            x86_64-unknown-linux-musl)
              if ! command -v x86_64-linux-musl-gcc >/dev/null 2>&1; then
                sudo ln -sf "$musl_gcc" /usr/local/bin/x86_64-linux-musl-gcc
              fi
              ;;
            aarch64-unknown-linux-musl)
              if ! command -v aarch64-linux-musl-gcc >/dev/null 2>&1; then
                sudo ln -sf "$musl_gcc" /usr/local/bin/aarch64-linux-musl-gcc
              fi
              ;;
          esac
      - name: Build edge binary
        run: cargo build --release --no-default-features --features edge --bin thinclaw --target ${{ matrix.target }}
      - name: Package edge artifact
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p target/edge-artifacts/package
          cp "target/${{ matrix.target }}/release/thinclaw" target/edge-artifacts/package/thinclaw
          chmod +x target/edge-artifacts/package/thinclaw
          archive="thinclaw-edge-${{ matrix.target }}.tar.gz"
          tar -C target/edge-artifacts/package -czf "target/edge-artifacts/${archive}" thinclaw
          sha256sum "target/edge-artifacts/${archive}" | awk -v f="$archive" '{print $1 "  " f}' >> target/edge-artifacts/checksums-edge.txt
          if [[ "${{ matrix.target }}" == *-musl ]]; then
            if ldd target/edge-artifacts/package/thinclaw >/tmp/thinclaw-edge-ldd.txt 2>&1 && ! grep -qi "statically linked" /tmp/thinclaw-edge-ldd.txt; then
              cat /tmp/thinclaw-edge-ldd.txt
              echo "::error::musl/static-ish artifact appears dynamically linked"
              exit 1
            fi
            cat /tmp/thinclaw-edge-ldd.txt || true
          fi
      - name: Upload edge artifact to release
        shell: bash
        run: |
          set -euo pipefail
          gh release upload "${{ needs.plan.outputs.tag }}" target/edge-artifacts/thinclaw-edge-${{ matrix.target }}.tar.gz --clobber
      - name: Upload edge checksum artifact
        uses: actions/upload-artifact@v4
        with:
          name: edge-checksum-${{ matrix.target }}
          path: target/edge-artifacts/checksums-edge.txt

  publish-edge-checksums:
    needs:
      - plan
      - build-edge-artifacts
    if: ${{ always() && needs.build-edge-artifacts.result == 'success' }}
    runs-on: ubuntu-22.04
    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - name: Download edge checksums
        uses: actions/download-artifact@v4
        with:
          pattern: edge-checksum-*
          path: target/edge-checksums
          merge-multiple: true
      - name: Publish edge checksums
        shell: bash
        run: |
          set -euo pipefail
          sort -k2 target/edge-checksums/checksums-edge.txt > checksums-edge.txt
          gh release upload "${{ needs.plan.outputs.tag }}" checksums-edge.txt --clobber

  # Prepare patched manifest SHA256 checksums as an artifact for follow-up PRs
  # so release jobs don't fail on protected default branches.
  update-registry-checksums:
    needs:
      - plan
      - host
      - build-wasm-extensions
    if: ${{ always() && needs.host.result == 'success' && needs.build-wasm-extensions.result == 'success' }}
    runs-on: "ubuntu-22.04"
    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - uses: actions/checkout@v6
      - name: Fetch WASM checksums
        uses: actions/download-artifact@v4
        with:
          name: artifacts-wasm-extensions
          path: target/wasm-bundles/
      - name: Patch manifests with artifact URLs and SHA256
        shell: bash
        env:
          RELEASE_TAG: ${{ needs.plan.outputs.tag }}
        run: |
          CHECKSUMS="target/wasm-bundles/checksums.txt"
          if [ ! -f "$CHECKSUMS" ]; then
            echo "No checksums.txt found"
            exit 0
          fi

          REPO="${GITHUB_REPOSITORY}"

          while IFS= read -r line; do
            sha256=$(echo "$line" | awk '{print $1}')
            filename=$(echo "$line" | awk '{print $2}')
            name=$(echo "$filename" | sed 's/-wasm32-wasip2\.tar\.gz$//')
            download_url="https://github.com/${REPO}/releases/download/${RELEASE_TAG}/${filename}"

            # Search all manifests by their internal .name field, not filename
            for manifest in registry/tools/*.json registry/channels/*.json; do
              [ -f "$manifest" ] || continue
              manifest_name=$(jq -r '.name' "$manifest")
              if [ "$manifest_name" = "$name" ]; then
                jq --arg url "$download_url" --arg sha "$sha256" \
                  '.artifacts["wasm32-wasip2"].url = $url | .artifacts["wasm32-wasip2"].sha256 = $sha' \
                  "$manifest" > "${manifest}.tmp" && mv "${manifest}.tmp" "$manifest"
                echo "Patched $manifest (name=$manifest_name): url=$download_url sha256=$sha256"
              fi
            done
          done < "$CHECKSUMS"
      - name: Package updated manifests
        id: package-registry
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p target/registry-checksum-updates

          git add registry/
          if git diff --cached --quiet; then
            echo "No manifest changes to package"
            echo "has_changes=false" >> "$GITHUB_OUTPUT"
          else
            git diff --cached --name-only > target/registry-checksum-updates/changed-files.txt
            tar czf target/registry-checksum-updates/registry-updates.tar.gz registry/
            echo "has_changes=true" >> "$GITHUB_OUTPUT"
          fi
      - name: Upload registry checksum updates
        if: ${{ steps.package-registry.outputs.has_changes == 'true' }}
        uses: actions/upload-artifact@v4
        with:
          name: artifacts-registry-checksum-updates
          path: target/registry-checksum-updates/*

  announce:
    needs:
      - plan
      - host
    # use "always() && ..." to allow us to wait for all publish jobs while
    # still allowing individual publish jobs to skip themselves (for prereleases).
    # "host" however must run to completion, no skipping allowed!
    if: ${{ always() && needs.host.result == 'success' }}
    runs-on: "ubuntu-22.04"
    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false
          submodules: recursive

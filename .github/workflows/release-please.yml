name: Release Please

on:
  workflow_dispatch:
  push:
    branches:
      - main

permissions:
  actions: write
  contents: write
  issues: write
  pull-requests: write

jobs:
  release-please:
    name: Prepare or publish release
    runs-on: ubuntu-latest
    steps:
      - name: Prepare release PR or publish merged release
        id: release
        # v4.4.1, pinned to its immutable commit.
        uses: googleapis/release-please-action@5c625bfb5d1ff62eadeeb3772007f7f66fdcf071
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json

      # Events created by GITHUB_TOKEN do not recursively start other
      # workflows. Dispatch protected CI explicitly so the generated release
      # PR remains mergeable without requiring a separate PAT.
      - name: Trigger protected CI for the release PR
        if: steps.release.outputs.prs_created == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RELEASE_PR: ${{ steps.release.outputs.pr }}
        run: |
          set -euo pipefail
          branch="$(jq -r '.headBranchName // empty' <<<"$RELEASE_PR")"
          test -n "$branch"
          gh workflow run ci.yml --ref "$branch"

      # A newly-created release event is suppressed for the same reason, so
      # dispatch the existing artifact pipeline explicitly.
      - name: Trigger artifact builds for the released tag
        if: steps.release.outputs.release_created == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RELEASE_TAG: ${{ steps.release.outputs.tag_name }}
        run: |
          set -euo pipefail
          test -n "$RELEASE_TAG"
          gh workflow run release.yml --ref main -f tag="$RELEASE_TAG"

name: Release Credential Gate

on:
  workflow_run:
    workflows: [CI]
    types: [completed]
  workflow_dispatch:
    inputs:
      head_sha:
        description: Release PR head commit to receive the credential status
        required: true
        type: string

permissions:
  contents: read
  pull-requests: read
  statuses: write

jobs:
  release-credentials:
    name: Publish release credential status
    if: >-
      github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'workflow_run' &&
      github.event.workflow_run.event == 'pull_request')
    runs-on: ubuntu-latest
    env:
      HEAD_SHA: ${{ github.event_name == 'workflow_dispatch' && inputs.head_sha || github.event.workflow_run.head_sha }}
      RELEASE_BRANCH: release-please--branches--main--components--thinclaw
    steps:
      # workflow_run executes this definition from the default branch and does
      # not check out pull-request code. That keeps release secrets outside the
      # control of the commit whose status is being published.
      - name: Resolve pull request target
        id: target
        env:
          GH_TOKEN: ${{ github.token }}
          EVENT_HEAD_BRANCH: ${{ github.event.workflow_run.head_branch }}
          EVENT_HEAD_REPOSITORY: ${{ github.event.workflow_run.head_repository.full_name }}
        shell: bash
        run: |
          set -euo pipefail
          if [[ ! "$HEAD_SHA" =~ ^[0-9a-f]{40}$ ]]; then
            echo '::error::Invalid target commit SHA'
            exit 1
          fi

          if [[ "$GITHUB_EVENT_NAME" == 'workflow_dispatch' ]]; then
            pulls="$(gh api "repos/$GITHUB_REPOSITORY/commits/$HEAD_SHA/pulls")"
            branch="$(jq -r --arg sha "$HEAD_SHA" \
              '[.[] | select(.state == "open" and .base.ref == "main" and .head.sha == $sha)][0].head.ref // empty' \
              <<<"$pulls")"
            repository="$(jq -r --arg sha "$HEAD_SHA" \
              '[.[] | select(.state == "open" and .base.ref == "main" and .head.sha == $sha)][0].head.repo.full_name // empty' \
              <<<"$pulls")"
          else
            branch="$EVENT_HEAD_BRANCH"
            repository="$EVENT_HEAD_REPOSITORY"
          fi

          if [[ -z "$branch" || -z "$repository" ]]; then
            echo '::error::Target commit is not the head of an open pull request into main'
            exit 1
          fi
          echo "branch=$branch" >> "$GITHUB_OUTPUT"
          echo "repository=$repository" >> "$GITHUB_OUTPUT"

      - name: Validate release credentials
        id: gate
        env:
          HEAD_BRANCH: ${{ steps.target.outputs.branch }}
          HEAD_REPOSITORY: ${{ steps.target.outputs.repository }}
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
        shell: bash
        run: |
          set -euo pipefail

          state=success
          description="Not a Release Please pull request"

          if [[ "$HEAD_REPOSITORY" == "$GITHUB_REPOSITORY" && "$HEAD_BRANCH" == "$RELEASE_BRANCH" ]]; then
            state=failure
            description="Release signing credentials are not ready"

            required=(
              APPLE_CERTIFICATE
              APPLE_CERTIFICATE_PASSWORD
              APPLE_ID
              APPLE_PASSWORD
              APPLE_TEAM_ID
              TAURI_SIGNING_PRIVATE_KEY
            )
            missing=()
            for name in "${required[@]}"; do
              if [[ -z "${!name:-}" ]]; then
                missing+=("$name")
              fi
            done

            if (( ${#missing[@]} > 0 )); then
              printf '::error::Missing required release secret: %s\n' "${missing[@]}"
            else
              invalid=0
              certificate="$RUNNER_TEMP/apple-certificate.p12"
              updater_key="$RUNNER_TEMP/tauri-updater.key"
              trap 'rm -f "$certificate" "$updater_key"' EXIT

              if ! printf '%s' "$APPLE_CERTIFICATE" | base64 --decode > "$certificate" 2>/dev/null; then
                echo '::error::APPLE_CERTIFICATE is not valid base64'
                invalid=1
              elif ! openssl pkcs12 -in "$certificate" -passin env:APPLE_CERTIFICATE_PASSWORD -noout >/dev/null 2>&1 \
                && ! openssl pkcs12 -legacy -in "$certificate" -passin env:APPLE_CERTIFICATE_PASSWORD -noout >/dev/null 2>&1; then
                echo '::error::APPLE_CERTIFICATE is not a readable PKCS#12 archive with APPLE_CERTIFICATE_PASSWORD'
                invalid=1
              fi

              if [[ ! "$APPLE_ID" =~ ^[^[:space:]@]+@[^[:space:]@]+$ ]]; then
                echo '::error::APPLE_ID must be an email address'
                invalid=1
              fi
              if [[ ! "$APPLE_TEAM_ID" =~ ^[A-Z0-9]{10}$ ]]; then
                echo '::error::APPLE_TEAM_ID must be a 10-character Apple team identifier'
                invalid=1
              fi

              if ! printf '%s' "$TAURI_SIGNING_PRIVATE_KEY" | base64 --decode > "$updater_key" 2>/dev/null; then
                echo '::error::TAURI_SIGNING_PRIVATE_KEY is not valid base64'
                invalid=1
              else
                key_comment="$(sed -n '1p' "$updater_key")"
                if [[ "$key_comment" != 'untrusted comment: rsign encrypted secret key'* \
                  && "$key_comment" != 'untrusted comment: minisign secret key'* \
                  && "$key_comment" != 'untrusted comment: minisign encrypted secret key'* ]]; then
                  echo '::error::TAURI_SIGNING_PRIVATE_KEY is not a supported Tauri updater key'
                  invalid=1
                fi
              fi

              if (( invalid == 0 )); then
                state=success
                description="Release signing credentials are present and readable"
              fi
            fi
          fi

          echo "state=$state" >> "$GITHUB_OUTPUT"
          echo "description=$description" >> "$GITHUB_OUTPUT"

      - name: Publish Release Credentials status
        if: always()
        env:
          GH_TOKEN: ${{ github.token }}
          STATE: ${{ steps.gate.outputs.state || 'error' }}
          DESCRIPTION: ${{ steps.gate.outputs.description || 'Release credential validation did not complete' }}
        shell: bash
        run: |
          set -euo pipefail
          if [[ ! "$HEAD_SHA" =~ ^[0-9a-f]{40}$ ]]; then
            echo "::error::Invalid target commit SHA"
            exit 1
          fi
          gh api --method POST "repos/$GITHUB_REPOSITORY/statuses/$HEAD_SHA" \
            --raw-field state="$STATE" \
            --raw-field context='Release Credentials' \
            --raw-field description="$DESCRIPTION" \
            --raw-field target_url="$GITHUB_SERVER_URL/$GITHUB_REPOSITORY/actions/runs/$GITHUB_RUN_ID"

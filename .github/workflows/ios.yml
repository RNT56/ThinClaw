name: iOS

on:
  push:
    branches: [main]
    paths:
      - "apps/ios/**"
      - "clients/openapi/**"
      - ".github/workflows/ios.yml"
    # Tag pushes matching ios-v* trigger the TestFlight archive job below.
    # (The path filter above does not apply to tag pushes.)
    tags:
      - "ios-v*"
  pull_request:
    paths:
      - "apps/ios/**"
      - "clients/openapi/**"
      - ".github/workflows/ios.yml"

permissions:
  contents: read

concurrency:
  group: ios-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: swift-format lint
    runs-on: macos-15
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      # The packages declare swift-tools-version 6.2, which needs the Swift 6.2
      # toolchain (Xcode 26). The runner's *default* Xcode is older (Swift 6.1),
      # so select the newest installed Xcode before any swift/xcodebuild call.
      - name: Select newest Xcode
        run: |
          latest=$(ls -d /Applications/Xcode_*.app 2>/dev/null | sort -V | tail -1)
          echo "Selecting ${latest:-<none found>}"
          [ -n "$latest" ] && sudo xcode-select -s "$latest"
          swift --version
      - name: Lint Swift sources
        working-directory: apps/ios
        run: |
          xcrun --find swift-format
          xcrun swift-format lint --strict --recursive --configuration .swift-format \
            Packages App Widgets Watch WatchWidgets NotificationService

  test-packages:
    name: swift test (${{ matrix.package }})
    runs-on: macos-15
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        package:
          - ThinClawTransport
          - ThinClawCore
          - ThinClawSnapshotKit
          - ThinClawAuth
          - ThinClawAPI
          - ThinClawPersistence
          - ThinClawLiveActivity
          - ThinClawWatchBridge
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - name: Select newest Xcode
        run: |
          latest=$(ls -d /Applications/Xcode_*.app 2>/dev/null | sort -V | tail -1)
          echo "Selecting ${latest:-<none found>}"
          [ -n "$latest" ] && sudo xcode-select -s "$latest"
          swift --version
      - name: Test
        run: swift test --package-path apps/ios/Packages/${{ matrix.package }}

  generated-drift:
    name: generated client drift
    runs-on: macos-15
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - name: Select newest Xcode
        run: |
          latest=$(ls -d /Applications/Xcode_*.app 2>/dev/null | sort -V | tail -1)
          echo "Selecting ${latest:-<none found>}"
          [ -n "$latest" ] && sudo xcode-select -s "$latest"
          swift --version
      # The drift check runs swift-openapi-generator, installed via mise.
      - uses: jdx/mise-action@e6a8b3978addb5a52f2b4cd9d91eafa7f0ab959d # v4
        with:
          working_directory: apps/ios
      - name: Check generated client freshness
        run: apps/ios/scripts/check-generated-drift.sh

  # Full app build via Tuist. Needs Xcode 26 (Swift 6.2) plus mise-managed
  # tuist. This is now a hard gate: the previous best-effort failure was a
  # reproducible, CI-only bug (see scripts/tuist-generate.sh) — the app target
  # declares resources: ["App/Resources/**"], the repo commits no files there,
  # and git does not track empty directories, so on a fresh checkout that dir
  # is ABSENT and `tuist generate` errors during "Loading and constructing the
  # graph" (exit 1, bare log reference). scripts/tuist-generate.sh creates the
  # missing declared resource dir before generation, which fixes it. Verified
  # locally by deleting App/Resources: generate goes from exit 1 -> exit 0.
  build-app:
    name: tuist build
    runs-on: macos-15
    timeout-minutes: 40
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - name: Select newest Xcode
        run: |
          latest=$(ls -d /Applications/Xcode_*.app 2>/dev/null | sort -V | tail -1)
          echo "Selecting ${latest:-<none found>}"
          [ -n "$latest" ] && sudo xcode-select -s "$latest"
          swift --version
      - uses: jdx/mise-action@e6a8b3978addb5a52f2b4cd9d91eafa7f0ab959d # v4
        with:
          working_directory: apps/ios
      - name: Generate workspace (resolves SPM via xcodebuild)
        working-directory: apps/ios
        run: |
          cp Config/Signing.example.xcconfig Config/Signing.local.xcconfig
          # Run the generator under mise so the pinned tuist 4.44 is used.
          mise x -- ./scripts/tuist-generate.sh
      - name: Build app for the iOS simulator
        working-directory: apps/ios
        run: |
          xcodebuild build \
            -workspace ThinClaw.xcworkspace \
            -scheme ThinClaw \
            -destination 'generic/platform=iOS Simulator' \
            -resultBundlePath build/app-simulator.xcresult \
            CODE_SIGNING_ALLOWED=NO
      - name: Build app for a generic iOS device
        working-directory: apps/ios
        run: |
          xcodebuild build \
            -workspace ThinClaw.xcworkspace \
            -scheme ThinClaw \
            -destination 'generic/platform=iOS' \
            CODE_SIGNING_ALLOWED=NO
      - name: Run app unit and UI tests
        working-directory: apps/ios
        run: ./scripts/app-tests.sh
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: app-build-xcresult
          path: apps/ios/build/app-simulator.xcresult
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: app-tests-xcresult
          path: apps/ios/build/app-tests.xcresult

  # watchOS whole-target build. The watch app (ThinClawWatch) and its embedded
  # WidgetKit complication (ThinClawWatchWidgets) are a *separate* watchOS
  # product that the build-app job never compiles — that job targets
  # `generic/platform=iOS Simulator`, which does not build the paired watchOS
  # app. This job closes that gap: it generates the workspace the same way and
  # builds the ThinClawWatch scheme for the watchOS simulator, giving the live
  # WatchConnectivity relay wiring (RouterGatewayProxy / WatchSessionDelegate)
  # and the complication a real compile gate. Hard gate: the target builds clean
  # against a freshly generated workspace. (A full phone<->watch round-trip
  # still needs paired hardware — WatchConnectivity does not run in the
  # simulator — so that part is on-device bring-up, not CI.)
  watch-build:
    name: watchOS build
    runs-on: macos-15
    timeout-minutes: 40
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - name: Select newest Xcode
        run: |
          latest=$(ls -d /Applications/Xcode_*.app 2>/dev/null | sort -V | tail -1)
          echo "Selecting ${latest:-<none found>}"
          [ -n "$latest" ] && sudo xcode-select -s "$latest"
          swift --version
      - uses: jdx/mise-action@e6a8b3978addb5a52f2b4cd9d91eafa7f0ab959d # v4
        with:
          working_directory: apps/ios
      - name: Generate workspace (resolves SPM via xcodebuild)
        working-directory: apps/ios
        run: |
          cp Config/Signing.example.xcconfig Config/Signing.local.xcconfig
          # Same generator as build-app so the empty App/Resources dir is created
          # before `tuist generate` (see scripts/tuist-generate.sh).
          mise x -- ./scripts/tuist-generate.sh
      - name: Build the watch app for the watchOS simulator
        working-directory: apps/ios
        run: |
          xcodebuild build \
            -workspace ThinClaw.xcworkspace \
            -scheme ThinClawWatch \
            -destination 'generic/platform=watchOS Simulator' \
            -resultBundlePath build/watch-simulator.xcresult \
            CODE_SIGNING_ALLOWED=NO
      - name: Build the watch app for a generic device
        working-directory: apps/ios
        run: |
          xcodebuild build \
            -workspace ThinClaw.xcworkspace \
            -scheme ThinClawWatch \
            -destination 'generic/platform=watchOS' \
            CODE_SIGNING_ALLOWED=NO
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: watch-build-xcresult
          path: apps/ios/build/watch-simulator.xcresult

  # iOS-only package tests on the newest concrete supported simulator. The
  # swift-test matrix above cannot cover these: Packages/Features/* declare
  # iOS 18+ only, so `swift test` (host-Mac build) skips them. This job runs all
  # six feature XCTest targets plus WidgetKitShared via `xcodebuild test
  # -scheme <Package>` on a booted supported simulator. The required-simulator
  # flag below turns a missing runtime into a hard CI failure.
  feature-tests:
    name: iOS package tests (latest simulator)
    runs-on: macos-15
    # Bounded so a hung simulator boot / test process can never hold the run
    # open (a stuck xcodebuild test otherwise inherits GitHub's 6h default).
    # Missing runtimes fail quickly; the cap only fires on a genuine hang.
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - name: Select newest Xcode
        run: |
          latest=$(ls -d /Applications/Xcode_*.app 2>/dev/null | sort -V | tail -1)
          echo "Selecting ${latest:-<none found>}"
          [ -n "$latest" ] && sudo xcode-select -s "$latest"
          swift --version
      - name: List available simulators
        run: xcrun simctl list devices available | grep -i ios || true
      - name: Run Feature package tests
        working-directory: apps/ios
        env:
          FEATURE_TESTS_REQUIRE_SIM: "1"
        run: ./scripts/feature-tests.sh

  minimum-os-tests:
    name: iOS package tests (minimum iOS 18)
    if: startsWith(github.ref, 'refs/tags/ios-v')
    runs-on: macos-15
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v7
      - name: Select newest Xcode
        run: |
          latest=$(ls -d /Applications/Xcode_*.app 2>/dev/null | sort -V | tail -1)
          [ -n "$latest" ] && sudo xcode-select -s "$latest"
          swift --version
      - name: Run minimum-OS package tests
        working-directory: apps/ios
        env:
          FEATURE_TESTS_REQUIRE_SIM: "1"
          IOS_RUNTIME_MAJOR: "18"
        run: ./scripts/feature-tests.sh

  archive-validation:
    name: unsigned release archive validation
    runs-on: macos-15
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v7
      - name: Select newest Xcode
        run: |
          latest=$(ls -d /Applications/Xcode_*.app 2>/dev/null | sort -V | tail -1)
          [ -n "$latest" ] && sudo xcode-select -s "$latest"
      - uses: jdx/mise-action@v4
        with:
          working_directory: apps/ios
      - name: Generate workspace
        working-directory: apps/ios
        run: mise x -- ./scripts/tuist-generate.sh
      - name: Validate release archive graph
        working-directory: apps/ios
        run: |
          xcodebuild archive \
            -workspace ThinClaw.xcworkspace \
            -scheme ThinClaw \
            -destination 'generic/platform=iOS' \
            -archivePath build/ThinClaw-unsigned.xcarchive \
            -resultBundlePath build/archive-validation.xcresult \
            CODE_SIGNING_ALLOWED=NO \
            CURRENT_PROJECT_VERSION="${GITHUB_RUN_NUMBER}"
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: archive-validation
          path: |
            apps/ios/build/archive-validation.xcresult
            apps/ios/build/ThinClaw-unsigned.xcarchive

  # TestFlight archive + export + upload. Runs only on an `ios-v*` tag push.
  # Credential-gated: without the App Store Connect API key secrets (which the
  # public repo does not carry), the signing steps are skipped with a clear
  # message rather than failing — the archive requires an operator's own Apple
  # team. No fastlane, no match, no committed provisioning profiles.
  testflight-upload:
    name: TestFlight credentialed upload (tag ios-v*)
    if: startsWith(github.ref, 'refs/tags/ios-v')
    runs-on: macos-15
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - name: Select newest Xcode
        run: |
          latest=$(ls -d /Applications/Xcode_*.app 2>/dev/null | sort -V | tail -1)
          echo "Selecting ${latest:-<none found>}"
          [ -n "$latest" ] && sudo xcode-select -s "$latest"
          swift --version
      - uses: jdx/mise-action@e6a8b3978addb5a52f2b4cd9d91eafa7f0ab959d # v4
        with:
          working_directory: apps/ios
      # Surface whether distribution credentials are configured. Secrets cannot
      # be referenced in job/step `if:` expressions, so we gate on an env var.
      - name: Check for distribution credentials
        id: creds
        env:
          DEVELOPMENT_TEAM: ${{ secrets.APPLE_DEVELOPMENT_TEAM }}
          APP_STORE_CONNECT_KEY_ID: ${{ secrets.APP_STORE_CONNECT_KEY_ID }}
          APP_STORE_CONNECT_ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_ISSUER_ID }}
          APP_STORE_CONNECT_KEY_P8: ${{ secrets.APP_STORE_CONNECT_KEY_P8 }}
        run: |
          if [ -n "$DEVELOPMENT_TEAM" ] \
            && [ -n "$APP_STORE_CONNECT_KEY_ID" ] \
            && [ -n "$APP_STORE_CONNECT_ISSUER_ID" ] \
            && [ -n "$APP_STORE_CONNECT_KEY_P8" ]; then
            echo "present=true" >> "$GITHUB_OUTPUT"
            echo "Distribution credentials present — will archive, export, and upload."
          else
            echo "present=false" >> "$GITHUB_OUTPUT"
            echo "::notice::App Store Connect credentials not configured; skipping TestFlight archive. Set APPLE_DEVELOPMENT_TEAM, APP_STORE_CONNECT_KEY_ID, APP_STORE_CONNECT_ISSUER_ID, and APP_STORE_CONNECT_KEY_P8 secrets to enable it."
          fi
      - name: Archive, export, and upload to TestFlight
        if: steps.creds.outputs.present == 'true'
        working-directory: apps/ios
        env:
          DEVELOPMENT_TEAM: ${{ secrets.APPLE_DEVELOPMENT_TEAM }}
          APP_STORE_CONNECT_KEY_ID: ${{ secrets.APP_STORE_CONNECT_KEY_ID }}
          APP_STORE_CONNECT_ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_ISSUER_ID }}
          APP_STORE_CONNECT_KEY_P8: ${{ secrets.APP_STORE_CONNECT_KEY_P8 }}
        run: scripts/archive.sh --upload

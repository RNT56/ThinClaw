name: CI
on:
  pull_request:
  push:
    branches:
      - main

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  # `dtolnay/rust-toolchain` already installs through rustup's `--profile minimal`
  # internally, so `profile: minimal` is redundant and not a supported action input.
  codestyle:
    name: Code Style (fmt + clippy)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
      - name: Install Rust
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: 1.92.0
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
      - name: Check formatting
        run: cargo fmt --all -- --check
      - name: Check lints (cargo clippy)
        run: cargo clippy -- -D warnings
      - name: Guard Linux deploy port
        run: |
          if rg -n "18789" Dockerfile deploy docs/DEPLOYMENT.md docs/EXTERNAL_DEPENDENCIES.md; then
            echo "Legacy gateway port 18789 must not appear in deploy files or deployment docs."
            exit 1
          fi
      - name: Install cargo-deny
        run: cargo install cargo-deny --locked
      - name: Audit dependencies
        run: cargo deny check

  # ── Per-profile compilation checks ──────────────────────────────────
  # Verifies that every supported build profile compiles, passes clippy,
  # and compiles tests.  The "light" profile (default) is what users get
  # via `cargo install thinclaw` — catching breakage here prevents
  # shipping broken binaries.  See docs/BUILD_PROFILES.md for details.
  feature-matrix:
    name: "Profile: ${{ matrix.name }}"
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: light (default)
            cargo-args: ""
          - name: full
            cargo-args: "--features full"
          - name: all-features
            cargo-args: "--all-features"
          - name: desktop
            cargo-args: "--no-default-features --features desktop"
          - name: minimal-libsql
            cargo-args: "--no-default-features --features libsql"
          - name: minimal-postgres
            cargo-args: "--no-default-features --features postgres"
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
      - name: Install Rust
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: 1.92.0
          components: clippy
      - uses: Swatinem/rust-cache@v2
        with:
          key: profile-${{ matrix.name }}
      - name: Install Linux all-features packages
        if: matrix.name == 'all-features'
        run: |
          sudo apt-get update
          sudo apt-get install -y libasound2-dev pkg-config
          rustup target add wasm32-wasip2
          cargo install wasm-tools --locked
      - name: cargo check
        run: cargo check ${{ matrix.cargo-args }}
      - name: cargo clippy
        run: cargo clippy ${{ matrix.cargo-args }} -- -D warnings
      - name: Compile tests (no run)
        run: cargo test --no-run ${{ matrix.cargo-args }}

  linux-host-smoke:
    name: Linux Host Runtime Smoke
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
      - name: Install Rust
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: 1.92.0
      - uses: Swatinem/rust-cache@v2
        with:
          key: linux-host-smoke
      - name: Host runtime smoke
        run: cargo test --features full --bin thinclaw --test host_runtime_smoke -- --nocapture --test-threads=1

  linux-arm64-host-smoke:
    name: Linux ARM64 Host Runtime Smoke
    runs-on: ubuntu-24.04-arm
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
      - name: Install Rust
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: 1.92.0
      - uses: Swatinem/rust-cache@v2
        with:
          key: linux-arm64-host-smoke
      - name: cargo check
        run: cargo check --features full
      - name: Compile host runtime smoke
        run: cargo test --features full --bin thinclaw --test host_runtime_smoke --no-run
      - name: Host runtime smoke
        run: cargo test --features full --bin thinclaw --test host_runtime_smoke run_no_onboard_binds_gateway -- --nocapture

  macos-host-regression:
    name: macOS Host Regression
    runs-on: macos-14
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
      - name: Install Rust
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: 1.92.0
      - uses: Swatinem/rust-cache@v2
        with:
          key: macos-host-regression
      - name: cargo check
        run: cargo check --features full
      - name: Compile tests (no run)
        run: cargo test --no-run --features full
      - name: Host runtime smoke
        run: cargo test --features full --bin thinclaw --test host_runtime_smoke run_no_onboard_binds_gateway -- --nocapture

  linux-deploy-smoke:
    name: Linux Docker Deploy Smoke
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
      - name: Build Docker image with full profile
        run: docker build --build-arg BUILD_FEATURES=full -t thinclaw:ci .
      - name: Prepare Compose env
        run: |
          cp deploy/env.example deploy/.env
          sed -i 's/^GATEWAY_AUTH_TOKEN=.*/GATEWAY_AUTH_TOKEN=ci-smoke-token/' deploy/.env
          sed -i 's/^LLM_BACKEND=.*/LLM_BACKEND=ollama/' deploy/.env
          sed -i 's|^LLM_BASE_URL=.*|OLLAMA_BASE_URL=http://127.0.0.1:11434|' deploy/.env
          sed -i 's/^EMBEDDING_ENABLED=.*/EMBEDDING_ENABLED=false/' deploy/.env
      - name: Compose smoke
        working-directory: deploy
        run: |
          docker compose up -d --build thinclaw
          for i in {1..60}; do
            if curl -fsS http://127.0.0.1:3000/api/health; then
              exit 0
            fi
            sleep 2
          done
          docker compose ps
          docker compose logs thinclaw
          exit 1
      - name: Compose cleanup
        if: always()
        working-directory: deploy
        run: |
          if [ -f .env ]; then
            docker compose down -v
          fi

  linux-docker-multiarch-metadata:
    name: Linux Docker Multi-Arch Metadata
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Verify base images support ARM64
        run: |
          docker buildx imagetools inspect rust:1.92-slim-bookworm | grep -q 'linux/arm64'
          docker buildx imagetools inspect debian:bookworm-slim | grep -q 'linux/arm64'
      - name: Validate local Docker build
        run: docker buildx build --platform linux/amd64 --build-arg BUILD_FEATURES=light --load -t thinclaw:ci-light .

  windows-host-matrix:
    name: "Windows Host: ${{ matrix.name }}"
    runs-on: windows-2022
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: light
            cargo-args: ""
          - name: full
            cargo-args: "--features full"
          - name: desktop
            cargo-args: "--no-default-features --features desktop"
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
      - name: Install Rust
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: 1.92.0
      - uses: Swatinem/rust-cache@v2
        with:
          key: windows-${{ matrix.name }}
      - name: cargo check
        run: cargo check ${{ matrix.cargo-args }}
      - name: Compile tests (no run)
        run: cargo test --no-run ${{ matrix.cargo-args }}

  windows-smoke:
    name: Windows Smoke
    runs-on: windows-2022
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
      - name: Install Rust
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: 1.92.0
      - uses: Swatinem/rust-cache@v2
        with:
          key: windows-smoke
      - name: Host runtime smoke
        run: cargo test --features full --test host_runtime_smoke run_no_onboard_binds_gateway -- --nocapture
      - name: Shell launcher smoke
        run: cargo test --features full launcher_has_expected_prefix_args -- --nocapture
      - name: State-path smoke
        run: cargo test --features full state_paths_share_same_root -- --nocapture
      - name: Windows path-escape smoke
        run: cargo test --features full detect_path_escape_understands_windows_absolute_paths -- --nocapture
      - name: Service adapter smoke
        run: cargo test --features full run_checked_succeeds_on_zero_exit -- --nocapture
      - name: Interpreter selection smoke
        run: cargo test --features full test_interpreter_for -- --nocapture
      - name: Signal attachment override smoke
        run: cargo test --features full signal_attachment_dir_prefers_override_env -- --nocapture

  db-contract-libsql:
    name: DB Contract (libSQL)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
      - name: Install Rust
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: 1.92.0
      - uses: Swatinem/rust-cache@v2
      - name: Run libSQL contract tests
        env:
          DATABASE_BACKEND: libsql
        run: cargo test --test db_contract --no-default-features --features libsql -- --nocapture

  db-contract-postgres:
    name: DB Contract (Postgres)
    runs-on: ubuntu-latest
    services:
      postgres:
        image: pgvector/pgvector:pg17
        env:
          POSTGRES_USER: thinclaw
          POSTGRES_PASSWORD: thinclaw
          POSTGRES_DB: thinclaw_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U thinclaw -d thinclaw_test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_BACKEND: postgres
      DATABASE_URL: postgres://thinclaw:thinclaw@localhost:5432/thinclaw_test
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
      - name: Install Rust
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: 1.92.0
      - uses: Swatinem/rust-cache@v2
      - name: Install psql client
        run: sudo apt-get update && sudo apt-get install -y postgresql-client
      - name: Enable pgvector extension
        run: PGPASSWORD=thinclaw psql -h localhost -U thinclaw -d thinclaw_test -c "CREATE EXTENSION IF NOT EXISTS vector;"
      - name: Run postgres contract tests
        run: cargo test --test db_contract --no-default-features --features postgres -- --nocapture --test-threads=1

  schema-divergence:
    name: Schema Divergence
    runs-on: ubuntu-latest
    services:
      postgres:
        image: pgvector/pgvector:pg17
        env:
          POSTGRES_USER: thinclaw
          POSTGRES_PASSWORD: thinclaw
          POSTGRES_DB: thinclaw_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U thinclaw -d thinclaw_test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_URL: postgres://thinclaw:thinclaw@localhost:5432/thinclaw_test
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
      - name: Install Rust
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: 1.92.0
      - uses: Swatinem/rust-cache@v2
      - name: Install psql client
        run: sudo apt-get update && sudo apt-get install -y postgresql-client
      - name: Enable pgvector extension
        run: PGPASSWORD=thinclaw psql -h localhost -U thinclaw -d thinclaw_test -c "CREATE EXTENSION IF NOT EXISTS vector;"
      - name: Run schema divergence test
        run: cargo test --test schema_divergence --no-default-features --features "postgres libsql" -- --nocapture --test-threads=1

  channel-crates:
    name: "Channel Crate: ${{ matrix.name }}"
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: telegram
            manifest_path: channels-src/telegram/Cargo.toml
          - name: slack
            manifest_path: channels-src/slack/Cargo.toml
          - name: discord
            manifest_path: channels-src/discord/Cargo.toml
          - name: whatsapp
            manifest_path: channels-src/whatsapp/Cargo.toml
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
      - name: Install Rust
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: 1.92.0
      - uses: Swatinem/rust-cache@v2
        with:
          key: channel-crate-${{ matrix.name }}
      - name: Run channel crate tests
        run: cargo test --manifest-path ${{ matrix.manifest_path }} -- --nocapture

  tool-crates:
    name: "Tool Crate: ${{ matrix.name }}"
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: brave-search
            manifest_path: tools-src/brave-search/Cargo.toml
          - name: github
            manifest_path: tools-src/github/Cargo.toml
          - name: gmail
            manifest_path: tools-src/gmail/Cargo.toml
          - name: google-calendar
            manifest_path: tools-src/google-calendar/Cargo.toml
          - name: google-docs
            manifest_path: tools-src/google-docs/Cargo.toml
          - name: google-drive
            manifest_path: tools-src/google-drive/Cargo.toml
          - name: google-sheets
            manifest_path: tools-src/google-sheets/Cargo.toml
          - name: google-slides
            manifest_path: tools-src/google-slides/Cargo.toml
          - name: notion
            manifest_path: tools-src/notion/Cargo.toml
          - name: okta
            manifest_path: tools-src/okta/Cargo.toml
          - name: slack
            manifest_path: tools-src/slack/Cargo.toml
          - name: telegram
            manifest_path: tools-src/telegram/Cargo.toml
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
      - name: Install Rust
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: 1.92.0
      - uses: Swatinem/rust-cache@v2
        with:
          key: tool-crate-${{ matrix.name }}
      - name: Run tool crate tests
        run: cargo test --manifest-path ${{ matrix.manifest_path }} -- --nocapture

  tests:
    name: Run Tests
    runs-on: ubuntu-latest
    env:
      DATABASE_BACKEND: libsql
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
      - name: Install Rust
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: 1.92.0
          components: llvm-tools-preview
          targets: wasm32-wasip2
      - uses: Swatinem/rust-cache@v2
      - name: Install system dependencies
        run: sudo apt-get update && sudo apt-get install -y libasound2-dev
      - name: Install cargo-llvm-cov
        uses: taiki-e/install-action@cargo-llvm-cov
      - name: Run tests with coverage
        run: cargo llvm-cov --all-features --codecov --output-path codecov.json -- --nocapture
      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v5
        with:
          files: codecov.json
          fail_ci_if_error: false

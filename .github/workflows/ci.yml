# ==========================================================================
# Lightweight CI — Quality Gates
#
# Runs on every push/PR to catch regressions early without doing full
# platform builds. Completes in ~2-4 minutes vs ~15-30 for build-release.
#
# Gates:
#   1. cargo check (ironclaw)         — compilation
#   2. cargo clippy (ironclaw)        — lint + code quality
#   3. cargo test (ironclaw)          — unit tests
#   4. cargo fmt --check (ironclaw)   — formatting
#   5. tsc --noEmit (frontend)        — TypeScript type checking
# ==========================================================================

name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1
  # Faster CI: share a single target dir, skip incremental
  CARGO_INCREMENTAL: 0

jobs:
  # ========================================================================
  # Rust — IronClaw
  # ========================================================================
  ironclaw-check:
    name: IronClaw Check & Clippy
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ironclaw
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - name: Cache Cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            ironclaw/target/
          key: ${{ runner.os }}-ironclaw-${{ hashFiles('ironclaw/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-ironclaw-

      - name: cargo check
        run: cargo check --all-targets

      - name: cargo clippy
        run: cargo clippy --all-targets -- -D warnings

      - name: cargo fmt --check
        run: cargo fmt --all -- --check

  ironclaw-test:
    name: IronClaw Test
    runs-on: ubuntu-latest
    needs: ironclaw-check
    defaults:
      run:
        working-directory: ironclaw
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            ironclaw/target/
          key: ${{ runner.os }}-ironclaw-${{ hashFiles('ironclaw/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-ironclaw-

      - name: cargo test
        run: cargo test

  # ========================================================================
  # Frontend — TypeScript
  # ========================================================================
  frontend-typecheck:
    name: Frontend TypeCheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: TypeScript check
        run: cd frontend && npx tsc --noEmit

name: CI
on:
  pull_request:
  push:
    branches:
      - main

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  codestyle:
    name: Code Style (fmt + clippy)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: 1.92.0
          profile: minimal
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
      - name: Check formatting
        run: cargo fmt --all -- --check
      - name: Check lints (cargo clippy)
        run: cargo clippy -- -D warnings
      - name: Install cargo-deny
        run: cargo install cargo-deny --locked
      - name: Audit dependencies
        run: cargo deny check

  # ── Per-profile compilation checks ──────────────────────────────────
  # Verifies that every supported build profile compiles, passes clippy,
  # and compiles tests.  The "light" profile (default) is what users get
  # via `cargo install thinclaw` — catching breakage here prevents
  # shipping broken binaries.  See docs/BUILD_PROFILES.md for details.
  feature-matrix:
    name: "Profile: ${{ matrix.name }}"
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: light (default)
            cargo-args: ""
          - name: full
            cargo-args: "--features full"
          - name: desktop
            cargo-args: "--no-default-features --features desktop"
          - name: minimal-libsql
            cargo-args: "--no-default-features --features libsql"
          - name: minimal-postgres
            cargo-args: "--no-default-features --features postgres"
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: 1.92.0
          components: clippy
      - uses: Swatinem/rust-cache@v2
        with:
          key: profile-${{ matrix.name }}
      - name: cargo check
        run: cargo check ${{ matrix.cargo-args }}
      - name: cargo clippy
        run: cargo clippy ${{ matrix.cargo-args }} -- -D warnings
      - name: Compile tests (no run)
        run: cargo test --no-run ${{ matrix.cargo-args }}

  db-contract-libsql:
    name: DB Contract (libSQL)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: 1.92.0
      - uses: Swatinem/rust-cache@v2
      - name: Run libSQL contract tests
        env:
          DATABASE_BACKEND: libsql
        run: cargo test --test db_contract --no-default-features --features libsql -- --nocapture

  db-contract-postgres:
    name: DB Contract (Postgres)
    runs-on: ubuntu-latest
    services:
      postgres:
        image: pgvector/pgvector:pg17
        env:
          POSTGRES_USER: thinclaw
          POSTGRES_PASSWORD: thinclaw
          POSTGRES_DB: thinclaw_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U thinclaw -d thinclaw_test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_BACKEND: postgres
      DATABASE_URL: postgres://thinclaw:thinclaw@localhost:5432/thinclaw_test
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: 1.92.0
      - uses: Swatinem/rust-cache@v2
      - name: Install psql client
        run: sudo apt-get update && sudo apt-get install -y postgresql-client
      - name: Enable pgvector extension
        run: PGPASSWORD=thinclaw psql -h localhost -U thinclaw -d thinclaw_test -c "CREATE EXTENSION IF NOT EXISTS vector;"
      - name: Run postgres contract tests
        run: cargo test --test db_contract --no-default-features --features postgres -- --nocapture --test-threads=1

  schema-divergence:
    name: Schema Divergence
    runs-on: ubuntu-latest
    services:
      postgres:
        image: pgvector/pgvector:pg17
        env:
          POSTGRES_USER: thinclaw
          POSTGRES_PASSWORD: thinclaw
          POSTGRES_DB: thinclaw_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U thinclaw -d thinclaw_test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_URL: postgres://thinclaw:thinclaw@localhost:5432/thinclaw_test
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: 1.92.0
      - uses: Swatinem/rust-cache@v2
      - name: Install psql client
        run: sudo apt-get update && sudo apt-get install -y postgresql-client
      - name: Enable pgvector extension
        run: PGPASSWORD=thinclaw psql -h localhost -U thinclaw -d thinclaw_test -c "CREATE EXTENSION IF NOT EXISTS vector;"
      - name: Run schema divergence test
        run: cargo test --test schema_divergence --no-default-features --features "postgres libsql" -- --nocapture --test-threads=1

  tests:
    name: Run Tests
    runs-on: ubuntu-latest
    services:
      postgres:
        image: pgvector/pgvector:pg17
        env:
          POSTGRES_USER: thinclaw
          POSTGRES_PASSWORD: thinclaw
          POSTGRES_DB: thinclaw_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U thinclaw -d thinclaw_test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_BACKEND: postgres
      DATABASE_URL: postgres://thinclaw:thinclaw@localhost:5432/thinclaw_test
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: 1.92.0
          components: llvm-tools-preview
      - uses: Swatinem/rust-cache@v2
      - name: Install system dependencies
        run: sudo apt-get update && sudo apt-get install -y libasound2-dev postgresql-client
      - name: Enable pgvector extension
        run: PGPASSWORD=thinclaw psql -h localhost -U thinclaw -d thinclaw_test -c "CREATE EXTENSION IF NOT EXISTS vector;"
      - name: Run database migrations
        run: |
          printf '%s\n' migrations/V*.sql | sort -V | while read -r f; do
            echo "Applying $f..."
            PGPASSWORD=thinclaw psql -h localhost -U thinclaw -d thinclaw_test -f "$f"
          done
      - name: Install cargo-llvm-cov
        uses: taiki-e/install-action@cargo-llvm-cov
      - name: Run tests with coverage
        run: cargo llvm-cov --all-features --codecov --output-path codecov.json -- --nocapture
      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v5
        with:
          file: codecov.json
          fail_ci_if_error: false
      - name: Run Telegram Channel Tests
        run: cargo test --manifest-path channels-src/telegram/Cargo.toml -- --nocapture

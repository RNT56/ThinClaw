[package]
name = "thinclaw-media"
version = "0.1.0"
edition = "2024"
license = "MIT OR Apache-2.0"
publish = false

[dependencies]
reqwest = { version = "0.12", default-features = false, features = ["json", "rustls-tls-native-roots"] }
pdf-extract = { version = "0.7", optional = true }
regex = { version = "1", optional = true }
serde = { version = "1", features = ["derive"] }
serde_json = "1"
sha2 = "0.10"
thinclaw-platform = { version = "0.1.0", path = "../thinclaw-platform" }
thinclaw-types = { version = "0.1.0", path = "../thinclaw-types" }
thiserror = "2"
tokio = { version = "1", features = ["fs", "process", "rt", "macros"] }
tracing = "0.1"
zip = { version = "2", default-features = false, features = ["deflate"], optional = true }

[features]
default = []
document-extraction = ["dep:pdf-extract", "dep:regex", "dep:zip"]

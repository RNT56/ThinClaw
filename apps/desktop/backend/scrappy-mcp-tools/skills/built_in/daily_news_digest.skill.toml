name = "Daily News Digest"
description = "Fetches top headlines and generates a concise summary."
version = "1.0.0"
author = "ThinClaw Team"
tools_used = ["news", "ai_tools"]
script_file = "daily_news_digest.rhai"

[[parameters]]
name = "category"
description = "News category (business, technology, science, health)"
param_type = "string"
required = false

[[parameters]]
name = "country"
description = "2-letter country code (us, uk, de, etc)"
param_type = "string"
required = false
default = "us"

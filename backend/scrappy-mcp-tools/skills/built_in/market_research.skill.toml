[name]
market_research

[description]
Research a market sector with stock prices and recent news.

[version]
1.0.0

[author]
Built-in

[tools_used]
["finance::search_financial_symbols", "finance::get_stock_price", "news::search_news"]

[[parameters]]
name = "sector"
description = "The market sector to research (e.g., 'artificial intelligence', 'semiconductors')"
param_type = "string"
required = true

[[parameters]]
name = "limit"
description = "Number of news articles to retrieve"
param_type = "number"
required = false
default = 3

[script_file]
market_research.rhai

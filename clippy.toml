# Complexity guardrails for AI-assisted development quality.
# These thresholds prevent new violations while preserving existing code.
# Matches ThinClaw's configuration.

cognitive-complexity-threshold = 15  # default: 25 (stricter to catch complex new functions)
too-many-lines-threshold = 100      # default: 100
too-many-arguments-threshold = 7    # default: 7
type-complexity-threshold = 250     # default: 250

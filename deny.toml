# Dependency auditing configuration for cargo-deny.
# Run: cargo deny check
# CI: .github/workflows/ci.yml (codestyle job)

[advisories]
unmaintained = "workspace"
yanked = "deny"
# Documented, web-verified risk-acceptances for advisories with NO fix available
# to us. Revisit whenever dependencies are bumped.
ignore = [
    # RUSTSEC-2026-0187 — stack overflow (SIGABRT, not catch_unwind-able) in
    # `lopdf` < 0.42.0 when parsing a deeply-nested untrusted PDF. Reached only
    # transitively via `pdf-extract 0.7.12` → `lopdf 0.34.0` behind the optional
    # `document-extraction` feature. No fix is available to us: `pdf-extract`
    # pins `lopdf = "^0.34"`, and no released `pdf-extract` yet uses `lopdf
    # >= 0.42`. Pre-existing (unrelated to this PR). Remove once `pdf-extract`
    # ships a release on `lopdf >= 0.42`. DoS-only (no RCE); document extraction
    # is opt-in and processes operator/agent-supplied input.
    "RUSTSEC-2026-0187",
]

[licenses]
version = 2
allow = [
    "MIT",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Unicode-3.0",
    "Unicode-DFS-2016",
    "OpenSSL",
    "Zlib",
    "MPL-2.0",
    "0BSD",
    "BSL-1.0",
    "CC0-1.0",
    "Unlicense",
    "CDLA-Permissive-2.0",
]
unused-allowed-license = "allow"

[bans]
multiple-versions = "warn"
wildcards = "deny"

[sources]
unknown-registry = "deny"
unknown-git = "deny"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
allow-git = []

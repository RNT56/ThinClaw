# Dependency auditing configuration for cargo-deny.
# Run: cargo deny check
# CI: .github/workflows/code_style.yml

[advisories]
unmaintained = "workspace"
yanked = "deny"
ignore = [
    # rand 0.8.x is still pulled in transitively by wasmtime-wasi, libsql,
    # rig-core, and nostr-sdk. The reported unsoundness requires a custom
    # logger re-entering rand::rng()/thread_rng() during reseeding; ThinClaw's
    # tracing/logging layers do not call rand from logger implementations.
    # Track for removal once those upstream crates move to rand >= 0.9.3.
    "RUSTSEC-2026-0097",
]

[licenses]
version = 2
allow = [
    "MIT",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Unicode-3.0",
    "Unicode-DFS-2016",
    "OpenSSL",
    "Zlib",
    "MPL-2.0",
    "0BSD",
    "BSL-1.0",
    "CC0-1.0",
    "Unlicense",
    "CDLA-Permissive-2.0",
]
unused-allowed-license = "allow"

[bans]
multiple-versions = "warn"
wildcards = "deny"

[sources]
unknown-registry = "deny"
unknown-git = "deny"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
allow-git = []

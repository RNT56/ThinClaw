# Dependency auditing configuration for cargo-deny.
# Run: cargo deny check
# CI: .github/workflows/ci.yml (codestyle job)

[advisories]
unmaintained = "workspace"
yanked = "deny"
# Documented, web-verified risk-acceptances for advisories with NO fix available
# to us. Revisit whenever dependencies are bumped.
# (RUSTSEC-2026-0187 lopdf nesting DoS is FIXED at the source — pdf-extract was
# bumped to 0.12 → lopdf 0.42, which bounds parser recursion — so no ignore is
# needed.)
ignore = []

[licenses]
version = 2
allow = [
    "MIT",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Unicode-3.0",
    "Unicode-DFS-2016",
    "OpenSSL",
    "Zlib",
    "MPL-2.0",
    "0BSD",
    "BSL-1.0",
    "CC0-1.0",
    "Unlicense",
    "CDLA-Permissive-2.0",
]
unused-allowed-license = "allow"

[bans]
multiple-versions = "warn"
wildcards = "deny"

[sources]
unknown-registry = "deny"
unknown-git = "deny"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
allow-git = []

<svg width="512" height="512" viewBox="0 0 512 512" fill="none" xmlns="http://www.w3.org/2000/svg">
    <!-- Liquid Glass Background -->
    <rect x="0" y="0" width="512" height="512" rx="115" fill="#1C1C1E"/>
    
    <!-- Inner Ambient Light (Bottom glow) -->
    <rect x="0" y="0" width="512" height="512" rx="115" fill="url(#ambient_glow)" fill-opacity="0.4"/>

    <!-- Glass Rim (Outer bevel) -->
    <rect x="2" y="2" width="508" height="508" rx="113" stroke="url(#rim_gradient)" stroke-width="4"/>
    
    <!-- Top Highlight (Specular Reflection) -->
    <rect x="0" y="0" width="512" height="256" rx="115" fill="url(#top_shine)" fill-opacity="0.15" style="mask: url(#top_mask);"/>

    <!-- Shadow for Depth (Offset and Blurred) -->
    <g opacity="0.4" transform="translate(0, 12)">
        <!-- Top 'S' Link Shadow -->
        <path d="M306 176H206C183.91 176 166 193.91 166 216C166 238.09 183.91 256 206 256H276C298.09 256 316 273.91 316 296C316 318.09 298.09 336 276 336H156" stroke="black" stroke-width="60" stroke-linecap="round" filter="url(#gaussian_blur)"/>
    </g>

    <!-- The S Shape - Constructed from two interlocking paths -->
    
    <!-- Top Segment (Cyan/Blue) - The 'Upper Hook' -->
    <!-- Starts Top Right, curves Left, hooks down into center -->
    <path d="M306 176H206C183.91 176 166 193.91 166 216C166 238.09 183.91 256 206 256H256" stroke="url(#grad1_vibrant)" stroke-width="60" stroke-linecap="round"/>
    
    <!-- Bottom Segment (Pink/Purple) - The 'Lower Hook' -->
    <!-- Starts Bottom Left, curves Right, hooks up from center (underneath/interlocked) -->
    <path d="M206 336H306C328.09 336 346 318.09 346 296C346 273.91 328.09 256 306 256H256" stroke="url(#grad2_vibrant)" stroke-width="60" stroke-linecap="round"/>

    <!-- Small Overlay to simulate 'threading' effect where the colors meet -->
    <!-- We want the blue to look like it's going INTO the purple or vice versa. -->
    <!-- Let's add a slight gradient overlay on the connector to smooth it. -->
    
    <!-- Gloss Overlay on the S -->
    <path d="M306 176H206C183.91 176 166 193.91 166 216C166 238.09 183.91 256 206 256H256" stroke="url(#logo_shine)" stroke-width="60" stroke-linecap="round" stroke-opacity="0.3" style="mix-blend-mode: overlay;"/>
    <path d="M206 336H306C328.09 336 346 318.09 346 296C346 273.91 328.09 256 306 256H256" stroke="url(#logo_shine)" stroke-width="60" stroke-linecap="round" stroke-opacity="0.3" style="mix-blend-mode: overlay;"/>

    <defs>
        <!-- Gradients and Filters (Same as before, tweaked for stroke use) -->
        <linearGradient id="rim_gradient" x1="256" y1="0" x2="256" y2="512" gradientUnits="userSpaceOnUse">
            <stop offset="0" stop-color="white" stop-opacity="0.8"/>
            <stop offset="0.3" stop-color="white" stop-opacity="0.1"/>
            <stop offset="1" stop-color="black" stop-opacity="0.4"/>
        </linearGradient>

        <radialGradient id="ambient_glow" cx="256" cy="512" r="300" gradientUnits="userSpaceOnUse">
             <stop offset="0" stop-color="#3B82F6" stop-opacity="0.3"/> 
             <stop offset="1" stop-color="#3B82F6" stop-opacity="0"/>
        </radialGradient>
        
        <linearGradient id="top_shine" x1="256" y1="0" x2="256" y2="256" gradientUnits="userSpaceOnUse">
             <stop offset="0" stop-color="white"/>
             <stop offset="1" stop-color="white" stop-opacity="0"/>
        </linearGradient>

        <linearGradient id="grad1_vibrant" x1="166" y1="176" x2="306" y2="256" gradientUnits="userSpaceOnUse">
            <stop stop-color="#22D3EE"/> <!-- Cyan -->
            <stop offset="1" stop-color="#3B82F6"/> <!-- Blue -->
        </linearGradient>

        <linearGradient id="grad2_vibrant" x1="206" y1="336" x2="346" y2="256" gradientUnits="userSpaceOnUse">
            <stop stop-color="#E879F9"/> <!-- Fuchsia -->
            <stop offset="1" stop-color="#A855F7"/> <!-- Purple -->
        </linearGradient>
        
        <linearGradient id="logo_shine" x1="0" y1="0" x2="1" y2="1" gradientUnits="objectBoundingBox">
             <stop offset="0" stop-color="white" stop-opacity="0.8"/>
             <stop offset="1" stop-color="white" stop-opacity="0"/>
        </linearGradient>
        
         <filter id="gaussian_blur">
            <feGaussianBlur in="SourceGraphic" stdDeviation="6" />
        </filter>
        
        <mask id="top_mask">
             <rect x="0" y="0" width="512" height="512" rx="115" fill="white"/>
        </mask>
    </defs>
</svg>

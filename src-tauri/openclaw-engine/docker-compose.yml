version: '3.8'

services:
  openclaw-engine:
    build: .
    restart: always
    ports:
      - "18789:18789"
    environment:
      - NODE_ENV=production
      - PORT=18789
      - OPENCLAW_HOME=/app/state
      # Add API Keys here if not configuring via GUI
      # - OPENAI_API_KEY=sk-...
      # - ANTHROPIC_API_KEY=sk-...
    volumes:
      - ./state:/app/state
